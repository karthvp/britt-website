<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f3d9d3;
      background: #1a0d18;
      position: relative;
    }
    /* Warm radial glow top-right */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(80% 70% at 85% 10%, rgba(201,165,114,0.22), rgba(201,165,114,0) 60%),
        radial-gradient(70% 80% at 95% 95%, rgba(243,217,211,0.08), rgba(243,217,211,0) 60%);
      pointer-events: none;
    }
    /* Subtle noise */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.85  0 0 0 0 0.83  0 0 0 0.6 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      opacity: 0.14;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .card {
      position: absolute;
      inset: 0;
      display: flex;
      padding: 70px 80px;
      gap: 60px;
      align-items: center;
    }

    .portrait {
      flex: 0 0 430px;
      height: 490px;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(243,217,211,0.08);
    }
    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 30%;
      filter: contrast(1.04) saturate(1.02);
    }
    .portrait::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(26,13,24,0) 55%, rgba(26,13,24,0.35) 100%);
      pointer-events: none;
    }

    .copy {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c9a572;
      font-weight: 500;
      margin-bottom: 26px;
    }
    .eyebrow::before {
      content: "";
      width: 36px;
      height: 1px;
      background: #c9a572;
      opacity: 0.9;
    }

    .name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 96px;
      line-height: 0.95;
      letter-spacing: -0.025em;
      color: #f3d9d3;
      margin: 0 0 26px;
    }

    .subtitle {
      font-size: 22px;
      line-height: 1.4;
      color: rgba(243,217,211,0.82);
      max-width: 30ch;
      margin: 0 0 38px;
      font-weight: 400;
      letter-spacing: -0.005em;
    }
    .subtitle em {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #f3d9d3;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 20px;
      border-top: 1px solid rgba(243,217,211,0.18);
      font-size: 14px;
      letter-spacing: 0.04em;
      color: rgba(243,217,211,0.7);
    }
    .footer .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #c9a572;
      opacity: 0.9;
    }
    .footer strong {
      color: #f3d9d3;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="portrait">
      <img src="../assets/portrait-about.jpg" alt="">
    </div>
    <div class="copy">
      <div class="eyebrow">HR Director</div>
      <h1 class="name">Brittney<br>Sauerwein</h1>
      <p class="subtitle">
        Driving <em>people strategy,</em> leadership, and organizational performance across global organizations.
      </p>
      <div class="footer">
        <strong>brittneysauerwein.com</strong>
        <span class="dot"></span>
        <span>Wichita, KS</span>
      </div>
    </div>
  </div>
</body>
</html>
